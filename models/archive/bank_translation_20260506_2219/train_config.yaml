data:
  max_length: 512
  train_path: data/train.csv
  val_path: data/val.csv
generation:
  max_new_tokens: 256
  temperature: 0.2
lora:
  alpha: 16
  dropout: 0.1
  r: 8
model:
  name: yandex/YandexGPT-5-Lite-8B-pretrain
training:
  batch_size: 2
  epochs: 5
  grad_accumulation_steps: 8
  learning_rate: 1.0e-05
  warmup_ratio: 0.1
